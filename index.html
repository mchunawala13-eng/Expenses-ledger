<style>
  :root {
    --ink: #1C1A17;
    --paper: #FAF6EF;
    --paper-soft: #F1EBDD;
    --factory: #C0531F;
    --factory-soft: #F3DCC9;
    --personal: #2C5F4F;
    --personal-soft: #D9E5DF;
    --muted: #8A8270;
    --line: #DDD4C0;
    --danger: #A33B2C;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overscroll-behavior-y: contain;
  }

  body {
    background-image:
      radial-gradient(circle at 1px 1px, rgba(28,26,23,0.04) 1px, transparent 1px);
    background-size: 14px 14px;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ---------- HEADER / STAMP TOGGLE ---------- */
  .header {
    padding: 22px 18px 14px;
    position: relative;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin: 0 0 10px;
  }

  .ledger-toggle {
    display: flex;
    gap: 10px;
  }

  .stamp {
    flex: 1;
    position: relative;
    border: 2.5px solid var(--ink);
    border-radius: 999px;
    padding: 11px 0;
    text-align: center;
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 17px;
    letter-spacing: 0.04em;
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    transition: transform 0.15s ease, background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    transform: rotate(-1.2deg);
    opacity: 0.55;
  }
  .stamp:nth-child(2) { transform: rotate(1deg); }

  .stamp.active {
    opacity: 1;
    box-shadow: 0 3px 0 rgba(28,26,23,0.15);
  }
  .stamp.active:active { transform: scale(0.97) rotate(0deg); }

  .stamp[data-book="factory"].active {
    background: var(--factory);
    border-color: var(--factory);
    color: var(--paper);
  }
  .stamp[data-book="personal"].active {
    background: var(--personal);
    border-color: var(--personal);
    color: var(--paper);
  }

  /* ---------- TOTAL RECEIPT CARD ---------- */
  .receipt {
    margin: 6px 18px 0;
    background: var(--ink);
    border-radius: 18px;
    padding: 22px 22px 18px;
    color: var(--paper);
    position: relative;
    overflow: hidden;
  }
  .receipt::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      transparent, transparent 27px, rgba(255,255,255,0.03) 27px, rgba(255,255,255,0.03) 28px
    );
    pointer-events: none;
  }

  .receipt-label {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    opacity: 0.6;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .receipt-amount {
    font-family: 'DM Serif Display', serif;
    font-size: 44px;
    line-height: 1.15;
    margin: 4px 0 2px;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
  }
  .receipt-amount .rupee { opacity: 0.7; font-size: 30px; margin-right: 2px; }

  .receipt-sub {
    display: flex;
    justify-content: space-between;
    font-size: 12.5px;
    opacity: 0.75;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed rgba(255,255,255,0.25);
  }
  .receipt-sub span b { font-variant-numeric: tabular-nums; color: var(--paper); opacity: 1; }

  /* ---------- QUICK ADD BAR ---------- */
  .quickadd {
    margin: 16px 18px 0;
    background: white;
    border: 1.5px solid var(--line);
    border-radius: 16px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-shadow: 0 2px 10px rgba(28,26,23,0.05);
  }

  .qa-row1 {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .qa-amount {
    flex: 1.1;
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    border: none;
    outline: none;
    background: transparent;
    color: var(--ink);
    min-width: 0;
  }
  .qa-amount::placeholder { color: #C9C0AC; font-style: italic; }

  .qa-note {
    flex: 1.6;
    font-size: 14px;
    border: none;
    outline: none;
    background: var(--paper-soft);
    border-radius: 10px;
    padding: 9px 10px;
    color: var(--ink);
    min-width: 0;
  }
  .qa-note::placeholder { color: var(--muted); }

  .qa-row2 {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .qa-row2::-webkit-scrollbar { display: none; }

  .chip {
    flex: none;
    font-size: 12.5px;
    font-weight: 500;
    padding: 7px 13px;
    border-radius: 999px;
    border: 1.5px solid var(--line);
    background: var(--paper-soft);
    color: var(--ink);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s ease;
  }
  .chip.selected {
    color: white;
    border-color: transparent;
  }
  body[data-book="factory"] .chip.selected { background: var(--factory); }
  body[data-book="personal"] .chip.selected { background: var(--personal); }

  .add-btn {
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 13px 0;
    font-size: 15px;
    font-weight: 700;
    color: white;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: transform 0.1s ease, opacity 0.2s ease;
  }
  .add-btn:active { transform: scale(0.985); }
  .add-btn:disabled { opacity: 0.35; cursor: default; }
  body[data-book="factory"] .add-btn { background: var(--factory); }
  body[data-book="personal"] .add-btn { background: var(--personal); }

  /* ---------- DAY NAV ---------- */
  .daynav {
    margin: 18px 18px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .daynav-date {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 17px;
  }
  .daynav-date .today-pill {
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--paper);
    background: var(--ink);
    padding: 2px 7px;
    border-radius: 999px;
    margin-left: 7px;
    vertical-align: 2px;
  }

  .daynav-btns { display: flex; gap: 6px; }
  .navbtn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    background: white;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 15px;
    color: var(--ink);
  }
  .navbtn:disabled { opacity: 0.3; cursor: default; }

  /* ---------- ENTRY LIST ---------- */
  .entries {
    margin: 10px 18px 100px;
    flex: 1;
  }

  .entry {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 4px;
    border-bottom: 1px dashed var(--line);
    position: relative;
  }
  .entry:last-child { border-bottom: none; }

  .entry-tag {
    width: 38px; height: 38px;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex: none;
  }
  body[data-book="factory"] .entry-tag { background: var(--factory-soft); }
  body[data-book="personal"] .entry-tag { background: var(--personal-soft); }

  .entry-body { flex: 1; min-width: 0; }
  .entry-note {
    font-size: 14.5px;
    font-weight: 600;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .entry-meta {
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 1px;
  }

  .entry-amt {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    font-variant-numeric: tabular-nums;
    flex: none;
  }

  .entry-del {
    position: absolute;
    right: -4px;
    top: 50%;
    transform: translateY(-50%);
    width: 26px; height: 26px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .entry:hover .entry-del,
  .entry:active .entry-del { opacity: 1; }
  .entry-del:active { background: var(--danger); color: white; }

  .empty-state {
    text-align: center;
    padding: 40px 20px 20px;
    color: var(--muted);
  }
  .empty-state .stamp-icon {
    font-size: 30px;
    margin-bottom: 8px;
    opacity: 0.5;
  }
  .empty-state .et { font-size: 14.5px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
  .empty-state .es { font-size: 12.5px; }

  /* ---------- WEEK STRIP (widget feel) ---------- */
  .weekstrip {
    margin: 4px 18px 0;
    display: flex;
    gap: 6px;
  }
  .wbar {
    flex: 1;
    background: white;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 7px 4px 6px;
    text-align: center;
    cursor: pointer;
  }
  .wbar.active {
    border-color: var(--ink);
  }
  body[data-book="factory"] .wbar.active { background: var(--factory-soft); border-color: var(--factory); }
  body[data-book="personal"] .wbar.active { background: var(--personal-soft); border-color: var(--personal); }
  .wbar .wd { font-size: 10px; color: var(--muted); font-weight: 600; letter-spacing: 0.03em; }
  .wbar .wv { font-size: 11.5px; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }

  /* ---------- TOAST ---------- */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--paper);
    padding: 11px 20px;
    border-radius: 999px;
    font-size: 13.5px;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s ease;
    z-index: 50;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
<link rel="manifest" href="manifest.json">
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function(e){ console.log('SW failed', e); });
  });
}
</script>
</head>
<body data-book="factory">
<div class="app">

  <div class="header">
    <p class="eyebrow">Daily Ledger</p>
    <div class="ledger-toggle">
      <button class="stamp active" data-book="factory" onclick="switchBook('factory')">Factory</button>
      <button class="stamp" data-book="personal" onclick="switchBook('personal')">Personal</button>
    </div>
  </div>

  <div class="receipt">
    <div class="receipt-label">
      <span id="receiptBookLabel">Factory · Today</span>
      <span id="receiptCount">0 entries</span>
    </div>
    <div class="receipt-amount"><span class="rupee">₹</span><span id="totalAmount">0</span></div>
    <div class="receipt-sub">
      <span>This week <b id="weekTotal">₹0</b></span>
      <span>This month <b id="monthTotal">₹0</b></span>
    </div>
  </div>

  <div class="weekstrip" id="weekStrip"></div>

  <div class="quickadd">
    <div class="qa-row1">
      <input type="number" inputmode="decimal" class="qa-amount" id="amountInput" placeholder="₹0" />
      <input type="text" class="qa-note" id="noteInput" placeholder="What for?" />
    </div>
    <div class="qa-row2" id="chipRow"></div>
    <button class="add-btn" id="addBtn" onclick="addEntry()" disabled>Add expense</button>
  </div>

  <div class="daynav">
    <div class="daynav-date" id="dayLabel">Today</div>
    <div class="daynav-btns">
      <button class="navbtn" onclick="shiftDay(-1)">‹</button>
      <button class="navbtn" id="nextDayBtn" onclick="shiftDay(1)">›</button>
    </div>
  </div>

  <div class="entries" id="entriesList"></div>

  <div class="toast" id="toast"></div>
</div>

<script>
  const STORAGE_KEY = 'murtuza_expense_ledger_v1';
  const CATEGORIES = {
    factory: ['Raw material', 'Transport', 'Labour', 'Repairs', 'Electricity', 'Misc'],
    personal: ['Food', 'Travel', 'Household', 'Medical', 'Family', 'Misc']
  };
  const ICONS = {
    'Raw material': '📦', 'Transport': '🚚', 'Labour': '👷', 'Repairs': '🔧',
    'Electricity': '⚡', 'Food': '🍽️', 'Travel': '🛺', 'Household': '🏠',
    'Medical': '💊', 'Family': '👨‍👩‍👧', 'Misc': '🧾'
  };

  let state = loadState();
  let currentBook = 'factory';
  let currentChip = null;
  let viewDate = startOfDay(new Date());

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { factory: [], personal: [] };
  }
  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch (e) { showToast('Could not save — storage full?'); }
  }

  function startOfDay(d) { const n = new Date(d); n.setHours(0,0,0,0); return n; }
  function dateKey(d) { return startOfDay(d).getTime(); }
  function isSameDay(a,b) { return dateKey(a) === dateKey(b); }
  function isToday(d) { return isSameDay(d, new Date()); }

  function fmtMoney(n) {
    return Math.round(n).toLocaleString('en-IN');
  }
  function fmtDayLabel(d) {
    if (isToday(d)) return 'Today';
    const y = new Date(); y.setDate(y.getDate()-1);
    if (isSameDay(d,y)) return 'Yesterday';
    return d.toLocaleDateString('en-IN', { day:'numeric', month:'short', weekday:'short' });
  }
  function fmtTime(ts) {
    return new Date(ts).toLocaleTimeString('en-IN', { hour:'numeric', minute:'2-digit' });
  }

  function switchBook(book) {
    currentBook = book;
    document.body.setAttribute('data-book', book);
    document.querySelectorAll('.stamp').forEach(s => s.classList.toggle('active', s.dataset.book === book));
    currentChip = null;
    renderChips();
    render();
  }

  function renderChips() {
    const row = document.getElementById('chipRow');
    row.innerHTML = '';
    CATEGORIES[currentBook].forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'chip' + (currentChip === cat ? ' selected' : '');
      btn.textContent = (ICONS[cat] || '') + ' ' + cat;
      btn.onclick = () => {
        currentChip = (currentChip === cat) ? null : cat;
        renderChips();
        const noteInput = document.getElementById('noteInput');
        if (currentChip && !noteInput.value) noteInput.value = currentChip;
      };
      row.appendChild(btn);
    });
  }

  function checkAddEnabled() {
    const amt = parseFloat(document.getElementById('amountInput').value);
    document.getElementById('addBtn').disabled = !(amt > 0);
  }

  function addEntry() {
    const amtInput = document.getElementById('amountInput');
    const noteInput = document.getElementById('noteInput');
    const amt = parseFloat(amtInput.value);
    if (!(amt > 0)) return;

    const entry = {
      id: Date.now() + '_' + Math.random().toString(36).slice(2,7),
      amount: amt,
      note: noteInput.value.trim() || currentChip || 'Expense',
      category: currentChip || 'Misc',
      ts: viewDate.getTime() === startOfDay(new Date()).getTime() ? Date.now() : viewDate.getTime() + (12*3600*1000),
      day: dateKey(viewDate)
    };

    state[currentBook].push(entry);
    saveState();

    amtInput.value = '';
    noteInput.value = '';
    currentChip = null;
    renderChips();
    checkAddEnabled();
    showToast('Added ₹' + fmtMoney(amt) + ' · ' + entry.category);
    render();
  }

  function deleteEntry(id) {
    state[currentBook] = state[currentBook].filter(e => e.id !== id);
    saveState();
    render();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  function shiftDay(delta) {
    const d = new Date(viewDate);
    d.setDate(d.getDate() + delta);
    if (dateKey(d) > dateKey(new Date())) return;
    viewDate = startOfDay(d);
    render();
  }

  function entriesForDay(book, day) {
    return state[book].filter(e => e.day === day);
  }

  function sumEntries(list) {
    return list.reduce((s,e) => s + e.amount, 0);
  }

  function weekRange(d) {
    const start = new Date(d); start.setDate(start.getDate() - start.getDay());
    return Array.from({length:7}, (_,i) => { const x = new Date(start); x.setDate(start.getDate()+i); return startOfDay(x); });
  }

  function renderWeekStrip() {
    const strip = document.getElementById('weekStrip');
    strip.innerHTML = '';
    const days = weekRange(viewDate);
    const labels = ['S','M','T','W','T','F','S'];
    days.forEach((d, i) => {
      const total = sumEntries(entriesForDay(currentBook, dateKey(d)));
      const div = document.createElement('div');
      div.className = 'wbar' + (dateKey(d) === dateKey(viewDate) ? ' active' : '');
      if (dateKey(d) > dateKey(new Date())) div.style.opacity = '0.35';
      div.innerHTML = `<div class="wd">${labels[i]}</div><div class="wv">${total > 0 ? '₹'+fmtMoney(total) : '—'}</div>`;
      if (dateKey(d) <= dateKey(new Date())) {
        div.onclick = () => { viewDate = d; render(); };
      }
      strip.appendChild(div);
    });
  }

  function render() {
    renderWeekStrip();

    const dayList = entriesForDay(currentBook, dateKey(viewDate)).sort((a,b) => b.ts - a.ts);
    const dayTotal = sumEntries(dayList);

    document.getElementById('totalAmount').textContent = fmtMoney(dayTotal);
    document.getElementById('receiptCount').textContent = dayList.length + (dayList.length === 1 ? ' entry' : ' entries');
    document.getElementById('receiptBookLabel').textContent =
      (currentBook === 'factory' ? 'Factory' : 'Personal') + ' · ' + (isToday(viewDate) ? 'Today' : fmtDayLabel(viewDate));

    const days = weekRange(viewDate);
    const weekTotal = sumEntries(state[currentBook].filter(e => days.some(d => dateKey(d) === e.day)));
    document.getElementById('weekTotal').textContent = '₹' + fmtMoney(weekTotal);

    const monthStart = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getTime();
    const monthEnd = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 1).getTime();
    const monthTotal = sumEntries(state[currentBook].filter(e => e.day >= monthStart && e.day < monthEnd));
    document.getElementById('monthTotal').textContent = '₹' + fmtMoney(monthTotal);

    document.getElementById('dayLabel').innerHTML = fmtDayLabel(viewDate) + (isToday(viewDate) ? ' <span class="today-pill">LIVE</span>' : '');
    document.getElementById('nextDayBtn').disabled = isToday(viewDate);

    const list = document.getElementById('entriesList');
    list.innerHTML = '';
    if (dayList.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="stamp-icon">🧾</div>
        <div class="et">No expenses logged${isToday(viewDate) ? ' yet' : ''}</div>
        <div class="es">${isToday(viewDate) ? 'Add your first one above.' : 'Nothing recorded this day.'}</div>
      </div>`;
      return;
    }
    dayList.forEach(e => {
      const row = document.createElement('div');
      row.className = 'entry';
      row.innerHTML = `
        <div class="entry-tag">${ICONS[e.category] || '🧾'}</div>
        <div class="entry-body">
          <div class="entry-note">${escapeHtml(e.note)}</div>
          <div class="entry-meta">${e.category} · ${fmtTime(e.ts)}</div>
        </div>
        <div class="entry-amt">₹${fmtMoney(e.amount)}</div>
        <button class="entry-del" onclick="deleteEntry('${e.id}')">✕</button>
      `;
      list.appendChild(row);
    });
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  document.getElementById('amountInput').addEventListener('input', checkAddEnabled);
  document.getElementById('noteInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') addEntry(); });
  document.getElementById('amountInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') addEntry(); });

  renderChips();
  render();
</script>
</body>
</html>
